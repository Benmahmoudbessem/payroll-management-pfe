name: CI/CD Payroll Management Platform

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-push-images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build backend image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/payroll-backend:latest "./projet pfe"
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/payroll-backend:latest ${{ secrets.DOCKERHUB_USERNAME }}/payroll-backend:${{ github.sha }}

      - name: Build frontend image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/payroll-frontend:latest "./front/payroll-management-frontend-full"
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/payroll-frontend:latest ${{ secrets.DOCKERHUB_USERNAME }}/payroll-frontend:${{ github.sha }}

      - name: Build AI service image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/payroll-ai-service:latest "./ai-service"
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/payroll-ai-service:latest ${{ secrets.DOCKERHUB_USERNAME }}/payroll-ai-service:${{ github.sha }}

      - name: Push backend image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/payroll-backend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/payroll-backend:${{ github.sha }}

      - name: Push frontend image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/payroll-frontend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/payroll-frontend:${{ github.sha }}

      - name: Push AI service image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/payroll-ai-service:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/payroll-ai-service:${{ github.sha }}