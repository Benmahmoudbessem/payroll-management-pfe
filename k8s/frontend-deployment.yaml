apiVersion: apps/v1
kind: Deployment
metadata:
  name: payroll-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payroll-frontend
  template:
    metadata:
      labels:
        app: payroll-frontend
    spec:
      containers:
        - name: payroll-frontend
          image: benmahmoud2024/payroll-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: payroll-frontend
spec:
  type: NodePort
  selector:
    app: payroll-frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30081